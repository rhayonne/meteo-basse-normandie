<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Météo Basse-Normandie Pro</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    #map {
      height: 700px;
      width: 100%;
      border-radius: 0.5rem;
    }

    /* Força a hierarquia de z-index dos Panes do Leaflet */
    .leaflet-pane .leaflet-tile-pane {
      z-index: 100;
    }

    .leaflet-pane .leaflet-overlay-pane {
      z-index: 300;
    }

    /* Máscara GeoJSON e Linhas */
    .leaflet-pane .weather-clouds-pane {
      z-index: 400;
      pointer-events: none;
    }

    /* Nuvens atrás */
    .leaflet-pane .leaflet-marker-pane {
      z-index: 600;
    }

    /* Temperaturas sempre no topo */

    .weather-icon-label {
      background: rgba(15, 23, 42, 0.9);
      border: 1px solid #38bdf8;
      border-radius: 4px;
      padding: 4px 8px;
      color: white;
      font-weight: bold;
      text-align: center;
      white-space: nowrap;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3);
    }
  </style>
</head>

<body class="bg-gray-900 text-gray-100 min-h-screen flex flex-col">

  <header class="bg-gray-800 p-4 border-b border-gray-700 flex justify-between items-center">
    <h1 class="text-xl font-bold text-sky-400">Météo Basse-Normandie <span class="text-sm font-normal text-gray-400">|
        Mode Station Dynamique</span></h1>
    <button id="btn-refresh"
      class="bg-sky-600 hover:bg-sky-500 text-white text-sm font-semibold py-1.5 px-4 rounded transition">
      Mettre à jour les données API
    </button>
  </header>

  <main class="flex-1 flex flex-col lg:flex-row p-6 gap-6">
    <!-- PAINEL DE CONTROLE -->
    <section
      class="w-full lg:w-1/4 bg-gray-800 p-4 rounded-lg border border-gray-700 flex flex-col gap-5 overflow-y-auto">

      <!-- Layers de Fundo -->
      <div>
        <h2 class="text-sm font-bold mb-2 uppercase tracking-wider text-sky-300">1. Fonds de Carte (Layers)</h2>
        <div class="space-y-2 text-sm bg-gray-900 p-3 rounded border border-gray-700">
          <label class="flex items-center gap-2 cursor-pointer">
            <input type="radio" name="map-tile" value="relevo" checked
              class="text-sky-500 focus:ring-0 bg-gray-700 border-gray-600">
            Carte Relief (OpenTopoMap)
          </label>
          <label class="flex items-center gap-2 cursor-pointer">
            <input type="radio" name="map-tile" value="satelite"
              class="text-sky-500 focus:ring-0 bg-gray-700 border-gray-600">
            Vue Satellite (Esri)
          </label>
          <label class="flex items-center gap-2 cursor-pointer">
            <input type="radio" name="map-tile" value="standard"
              class="text-sky-500 focus:ring-0 bg-gray-700 border-gray-600">
            Standard Sombre (CartoDB)
          </label>
        </div>
      </div>

      <!-- Dados Metereológicos -->
      <div>
        <h2 class="text-sm font-bold mb-2 uppercase tracking-wider text-sky-300">2. Affichage des Données</h2>
        <div class="space-y-2 text-sm bg-gray-900 p-3 rounded border border-gray-700">
          <label class="flex items-center gap-2 cursor-pointer">
            <input type="radio" name="data-view" value="temp" checked
              class="text-sky-500 focus:ring-0 bg-gray-700 border-gray-600">
            Afficher Température (°C)
          </label>
          <label class="flex items-center gap-2 cursor-pointer">
            <input type="radio" name="data-view" value="wind"
              class="text-sky-500 focus:ring-0 bg-gray-700 border-gray-600">
            Afficher Vitesse du Vent (km/h)
          </label>
        </div>
      </div>

      <!-- Camadas Atmosféricas Extras (Nuvens) -->
      <div>
        <h2 class="text-sm font-bold mb-2 uppercase tracking-wider text-sky-300">3. Calques Atmosphériques</h2>
        <div class="space-y-2 text-sm bg-gray-900 p-3 rounded border border-gray-700">
          <label class="flex items-center gap-2 cursor-pointer">
            <input type="checkbox" id="layer-clouds" checked
              class="text-sky-500 focus:ring-0 bg-gray-700 border-gray-600 rounded">
            Afficher Couverture Nuageuse (Arrière)
          </label>
        </div>
      </div>

      <!-- Ferramenta de Traçado Dinâmico -->
      <div>
        <h2 class="text-sm font-bold mb-2 uppercase tracking-wider text-sky-300">4. Tracer une Ligne (Fronts / Vent)
        </h2>
        <div class="space-y-3 text-sm bg-gray-900 p-3 rounded border border-gray-700">
          <div>
            <label class="block text-xs text-gray-400 mb-1">Couleur da la ligne:</label>
            <input type="color" id="line-color" value="#ef4444"
              class="w-full h-8 rounded bg-transparent border border-gray-600 cursor-pointer">
          </div>
          <button id="btn-draw"
            class="w-full bg-gray-700 hover:bg-gray-600 text-white text-xs font-semibold py-2 px-3 rounded border border-gray-600 transition">
            Mode Dessin: Activer Clic
          </button>
          <button id="btn-clear-lines"
            class="w-full bg-red-950/40 hover:bg-red-900/40 text-red-400 text-xs py-1 px-3 rounded border border-red-900/50 transition">
            Effacer les lignes
          </button>
        </div>
      </div>
    </section>

    <!-- MAPA -->
    <section class="flex-1 bg-gray-950 rounded-lg border border-gray-700 p-2">
      <div id="map"></div>
    </section>
  </main>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="app.js"></script>
</body>

</html>
